<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download Pop&Go</title>
  <script>
    (function () {
      var ua = navigator.userAgent || navigator.vendor || window.opera;
      var url;
      if (/android/i.test(ua)) {
        url = 'https://play.google.com/store/apps/details?id=me.lagbug.popandgo';
      } else {
        url = 'https://apps.apple.com/app/6748235605';
      }
      window.open(url, '_blank');
      window.location.replace('/');
    })();
  </script>
</head>
<body>
  <p>Redirecting to the app store&hellip;</p>
</body>
</html>
